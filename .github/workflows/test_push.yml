name: PR unit and integration tests
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Run the build with tmate debugging enabled"
        required: false
        default: false
  push:
    branches:
      - '**'
  schedule:
    - cron: "0 1 * * *"

jobs:
  Tests_and_docs:
    name: ${{ matrix.QGIS_DOCKER_VERSION }} Py${{ matrix.PYTHON_VERSION }} ${{ matrix.ENGINE_APPLICATION_MODE }}
    strategy:
      fail-fast: false
      matrix:
        # NOTE: macos complains about wheels; windows complains about script syntax
        # os: [ubuntu-latest, windows-latest, macos-latest]
        os: [ubuntu-latest]
        # NOTE: we might test also for qgis/qgis:3.22 that is the version of qgis-server that we are currently using in the Geoviewer, but it currently causes a segfault
        # NOTE: qgis:stable points to the latest release, wheread qgis:latest points to qgis master
        # QGIS_DOCKER_VERSION: ['qgis/qgis:ltr', 'qgis/qgis:stable']
        QGIS_DOCKER_VERSION: ['qgis/qgis:3.44.7']
        # NOTE: qgis uses its own python, but we want to check if there are problems interfacing with the engine while it uses different python versions
        PYTHON_VERSION: ['3.11', '3.12']
        ENGINE_APPLICATION_MODE: ['PUBLIC', 'RESTRICTED']
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_DEF_BR: master
      OQ_APPLICATION_MODE: ${{ matrix.ENGINE_APPLICATION_MODE }}
      OGR_SQLITE_JOURNAL: delete   # prevents WAL from modifying read-only geopackages

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}

      - name: ⏳ Install engine and restore oqdata
        run: |
          PY_VER=${{ matrix.PYTHON_VERSION }}
          echo "Python version to use: $PY_VER"
          python3 --version
          python$PY_VER --version

          if [ -z "$GITHUB_HEAD_REF" ]; then
            echo "Not a pull request, using branch: $GITHUB_DEF_BR"
            IRMT_BR=$GITHUB_DEF_BR
          else
            echo "Pull request, using branch: $GITHUB_HEAD_REF"
            IRMT_BR=$GITHUB_HEAD_REF
          fi
          ENGINE_BR=$IRMT_BR
          if [ "$(git ls-remote --heads https://github.com/gem/oq-engine.git ${ENGINE_BR})" = "" ]; then
            ENGINE_BR='master'
          fi
          echo "ENGINE_BR=${ENGINE_BR}" >> $GITHUB_ENV
          echo "IRMT_BR=${IRMT_BR}" >> $GITHUB_ENV

          curl -O https://raw.githubusercontent.com/gem/oq-engine/master/install.py
          echo "Engine branch: ${ENGINE_BR}"
          python$PY_VER install.py user --version=${ENGINE_BR}

          export PIP_DEFAULT_TIMEOUT=100
          source $HOME/openquake/bin/activate
          oq reset -y

          if [ "$OQ_APPLICATION_MODE" = "RESTRICTED" ]; then
            echo "Creating email templates"
            # NOTE: I can't find the templates to actualize, so I am creating empty files instead (they just need to exist in this case)
            for tpl in user_creation_email_content user_creation_email_subject \
                       password_reset_email_content password_reset_email_subject; do
              touch $HOME/openquake/lib/python$PY_VER/site-packages/openquake/server/templates/registration/${tpl}.txt
            done
          fi

          echo "Restoring OQ-Engine demos for branch ${ENGINE_BR}"
          oq restore https://artifacts.openquake.org/travis/oqdata-${ENGINE_BR}.zip ~/oqdata
          python $HOME/openquake/lib/python$PY_VER/site-packages/openquake/server/manage.py migrate

          if [ "$OQ_APPLICATION_MODE" = "RESTRICTED" ]; then
            echo "Creating a level 0 user and assigning restored jobs"
            python $HOME/openquake/lib/python$PY_VER/site-packages/openquake/server/manage.py \
              createuser level_0_user testuser1@test.com --level 0 --password level_0_password --no-email
            oq db "UPDATE job SET user_name = 'level_0_user'"
          fi

          oq --version
          oq webui start 172.17.0.1:8800 --skip-browser &> webui.log &
          echo "Waiting for WebUI on port 8800..."
          while ! nc -z 172.17.0.1 8800; do
            cat webui.log
            sleep 5
          done
          curl http://172.17.0.1:8800/v1/engine_version

      - name: 🐳 Start QGIS container
        run: |
          docker run -d -t --name qgis \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            -v ${PWD}:/tests_directory \
            -e OQ_ENGINE_HOST='http://172.17.0.1:8800' \
            -e BRANCH="$IRMT_BR" \
            -e ONLY_CALC_ID="$ONLY_CALC_ID" \
            -e ONLY_OUTPUT_TYPE="$ONLY_OUTPUT_TYPE" \
            -e GEM_QGIS_TEST=y \
            ${{ matrix.QGIS_DOCKER_VERSION }} bash -c "
              apt-get update -q
              DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb
              Xvfb :99 -screen 0 1024x768x24 &
              sleep 2
              tail -f /dev/null
            "
          echo "Waiting for Xvfb..."
          COUNT=0
          MAX_TRIES=20
          until docker exec qgis test -S /tmp/.X11-unix/X99 || [ $COUNT -ge $MAX_TRIES ]; do
            echo "Waiting for X ($COUNT)..."
            sleep 3
            COUNT=$((COUNT + 1))
          done
          if ! docker exec qgis test -S /tmp/.X11-unix/X99; then
            echo "X environment still not ready, aborting"
            exit 1
          fi

      - name: 📦 Install pytest-qgis in container
        run: |
          docker exec qgis bash -c "pip3 install --break-system-packages pytest-qgis"

      - name: Setup debugging session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - name: ℧ Run unit tests
        run: |
          # Ignore 139 (segfault) happening after tests complete, that may
          # happen during QgsApplication.exitQgis() teardown procedure
          docker exec -t qgis bash -c "
            export DISPLAY=:99
            export PYTHONPATH=/usr/share/qgis/python/plugins:\$PYTHONPATH
            export OGR_SQLITE_JOURNAL=delete
            python3 -m pytest -v /tests_directory/svir/test/unit/
            EXIT_CODE=\$?
            if [ \$EXIT_CODE -eq 139 ]; then
              echo 'Ignoring segfault during QGIS teardown (known issue)'
              exit 0
            fi
            exit \$EXIT_CODE
          "

      - name: ⨕ Run integration tests
        run: |
          docker exec qgis bash -c "
            git clone -q -b $ENGINE_BR --depth=1 https://github.com/gem/oq-engine.git \
            && echo 'Cloned oq-engine/$ENGINE_BR'
          "
          # Ignore 139 (segfault) happening after tests complete, that may
          # happen during QgsApplication.exitQgis() teardown procedure
          docker exec -t qgis bash -c "
            export DISPLAY=:99
            export PYTHONPATH=/usr/share/qgis/python/plugins:\$PYTHONPATH
            export OGR_SQLITE_JOURNAL=delete
            python3 -m pytest -v /tests_directory/svir/test/integration/test_drive_oq_engine.py
            EXIT_CODE=\$?
            if [ \$EXIT_CODE -eq 139 ]; then
              echo 'Ignoring segfault during QGIS teardown (known issue)'
              exit 0
            fi
            exit \$EXIT_CODE
          "

      - name: 📖 Make documentation
        run: |
          docker exec qgis bash -c "
            apt-get update -q
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              latexmk texlive-latex-extra python3-matplotlib \
              python3-sphinx python3-sphinx-rtd-theme dvipng
          "
          docker exec -t qgis bash -c "
            export DISPLAY=:99
            export PYTHONPATH=\$PYTHONPATH:/tests_directory
            cd /tests_directory/svir/help
            make latexpdf
            make html
          "

      - name: ㏒ Display web logs
        if: always()
        run: cat webui.log
